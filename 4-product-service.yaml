apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: accommodation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      nodeSelector:
        role: api
      containers:
      - name: product-service
        image: ghcr.io/ktk026/shoply-product:develop
        ports:
        - containerPort: 4001
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: db-config
        - secretRef:
            name: db-secret

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: accommodation
spec:
  selector:
    app: product-service
  ports:
  - port: 4001
    targetPort: 4001
