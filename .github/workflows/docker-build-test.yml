name: Docker Build Test

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la

      - name: Check Docker version
        run: docker --version

      # app 담당자가 실제 Dockerfile 경로를 확정하면 아래 주석을 해제해서 사용
      # - name: Build gateway image
      #   run: |
      #     docker build -t shoply-gateway:test ./app/msa_shoply/gateway

      
      - name: Build gateway image
        run: |
          docker build -t shoply-gateway:test ./app/shoply/gateway