name: Docker Build Test

on:
  push:
    branches:
      - cicd
  pull_request:
    branches:
      - develop

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la

      - name: Check Docker version
        run: docker --version

      - name: Build gateway image
        run: |
          docker build -t shoply-gateway:test ./app/shoply/gateway

      - name: Run gateway container
        run: |
          docker run -d --name gateway-test -p 4000:4000 shoply-gateway:test
          docker ps

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:4000/health
          
      # GitHub Secrets에 등록한 AWS 키와 리전 사용
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}   
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: shoply-gateway
          IMAGE_TAG: cicd-test
        run: |
          docker tag shoply-gateway:test $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG