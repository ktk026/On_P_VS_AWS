name: Docker Build Test

on:
  push:
    branches:
      - cicd
  pull_request:
    branches:
      - develop

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la

      - name: Check Docker version
        run: docker --version

      - name: Build gateway image
        run: |
          docker build -t shoply-gateway:test ./app/shoply/gateway

      - name: Run gateway container
        run: |
          docker run -d --name gateway-test -p 4000:4000 shoply-gateway:test
          docker ps

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:4000/health

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag and push image to GHCR
        run: |
          docker tag shoply-gateway:test ghcr.io/${{ github.repository_owner }}/shoply-gateway:cicd-test
          docker push ghcr.io/${{ github.repository_owner }}/shoply-gateway:cicd-test