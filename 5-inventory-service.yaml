apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: accommodation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      nodeSelector:
        role: api
      containers:
      - name: inventory-service
        image: 367299441871.dkr.ecr.ap-northeast-2.amazonaws.com/app-inventory:latest
        ports:
        - containerPort: 4002
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: db-config
        - secretRef:
            name: db-secret

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: accommodation
spec:
  selector:
    app: inventory-service
  ports:
  - port: 4002
    targetPort: 4002
