apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: accommodation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: inventory-service:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: db-config
        - secretRef:
            name: db-secret

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: accommodation
spec:
  selector:
    app: inventory-service
  ports:
  - port: 8000
    targetPort: 8000
