<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Scaling Service</title>
</head>
<body>
  <h1>온프레미스 서버를 위한 하이브리드 확장 서비스</h1>

  <h2>프로젝트 소개</h2>
  <p>
    온프레미스 환경에서 운영되는 서비스에 트래픽 폭주가 발생할 경우,
    AWS 클라우드 자원을 자동으로 확장하여 트래픽을 분산시키는
    하이브리드 클라우드 기반 자동 확장 플랫폼입니다.
  </p>

  <h2>주요 기능</h2>
  <ul>
    <li>Route53 기반 트래픽 분산</li>
    <li>Terraform 기반 AWS 인프라 자동 생성</li>
    <li>GitHub Actions 기반 CI/CD 자동화</li>
    <li>CloudWatch 기반 모니터링</li>
    <li>Lambda 기반 자동 확장 및 회수</li>
    <li>Grafana 기반 실시간 대시보드</li>
  </ul>
</body>
</html>
