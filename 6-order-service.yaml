apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: accommodation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      nodeSelector:
        role: service
      containers:
      - name: order-service
        image: 367299441871.dkr.ecr.ap-northeast-2.amazonaws.com/app-order:latest
        ports:
        - containerPort: 4003
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: db-config
        - secretRef:
            name: db-secret

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: accommodation
spec:
  selector:
    app: order-service
  ports:
  - port: 4003
    targetPort: 4003
