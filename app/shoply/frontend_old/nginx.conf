server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 요청은 gateway로 프록시
    location /api/ {
        proxy_pass http://gateway:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
