apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: accommodation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: 367299441871.dkr.ecr.ap-northeast-2.amazonaws.com/app-api:latest
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: db-config
        - secretRef:
            name: db-secret

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: accommodation
spec:
  selector:
    app: api-gateway
  ports:
  - port: 4000
    targetPort: 4000
