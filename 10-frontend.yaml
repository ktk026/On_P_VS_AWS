apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: accommodation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 367299441871.dkr.ecr.ap-northeast-2.amazonaws.com/app-frontend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: db-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: accommodation
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
