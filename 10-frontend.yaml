apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: accommodation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        role: service
      containers:
      - name: frontend
        image: ghcr.io/ktk026/shoply-frontend:develop
        ports:
        - containerPort: 8080  # GHCR 이미지 기준 8080 (CI/CD팀 확인 후 3000이면 변경)
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: db-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: accommodation
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 8080
